server:
  port: 8089

spring:
  application:
    name: notification-service

  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2s
        default-requeue-rejected: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  thymeleaf:
    cache: false

resilience4j:
  retry:
    instances:
      emailSender:
        maxAttempts: 3
        waitDuration: 2000ms

notification:
  from: ${NOTIFICATION_FROM:Tu Tienda <no-reply@tutienda.pe>}

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true