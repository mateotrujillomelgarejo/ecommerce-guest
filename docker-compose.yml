version: '3.9'

networks:
  ecommerce-net:
    driver: bridge

services:

  # ==========================================
  # 1. BROKERS Y CACHÉ (Inician Primero)
  # ==========================================

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net
    volumes:
      - redis-data:/data

  # ==========================================
  # 2. BASES DE DATOS (Inician Primero)
  # ==========================================

  mongo-product:
    image: mongo:6.0
    container_name: mongo-product
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: product_user
      MONGO_INITDB_ROOT_PASSWORD: Product123
      MONGO_INITDB_DATABASE: ecommerce_product
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  postgres-inventory:
    image: postgres:16
    container_name: postgres-inventory
    restart: always
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: InventoryPass123!
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  sqlserver-order:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-order
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TuPasswordFuerte123!"
      MSSQL_PID: Express
    ports:
      - "1435:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TuPasswordFuerte123!' -C -Q \"IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = 'orderdb') BEGIN CREATE DATABASE orderdb; END\" && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TuPasswordFuerte123!' -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - ecommerce-net

  postgres-customer:
    image: postgres:16
    container_name: postgres-customer
    restart: always
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: CustomerPass123!
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_user -d customer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  postgres-pricing:
    image: postgres:16
    container_name: postgres-pricing
    restart: always
    environment:
      POSTGRES_DB: pricing_db
      POSTGRES_USER: pricing_user
      POSTGRES_PASSWORD: PricingPass123!
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing_user -d pricing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  postgres-payment:
    image: postgres:16
    container_name: postgres-payment
    restart: always
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: PaymentPass123!
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  postgres-shipping:
    image: postgres:16
    container_name: postgres-shipping
    restart: always
    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: shipping_user
      POSTGRES_PASSWORD: ShippingPass123!
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping_user -d shipping_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ==========================================
  # 3. INFRAESTRUCTURA CORE (Config, luego Discovery)
  # ==========================================

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ecommerce-net

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ==========================================
  # 4. MICROSERVICIOS DE NEGOCIO
  # ==========================================

  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=mongo-product
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
      - BD_MONG=admin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      mongo-product:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - ecommerce-net

  cart-service:
    build: ./cart-service
    container_name: cart-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=sqlserver-order
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
      - ORD_USR=sa
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      sqlserver-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - ecommerce-net

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres-inventory
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-inventory:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - ecommerce-net

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres-customer
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-customer:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8089:8089"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8089/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - ecommerce-net

  pricing-service:
    build: ./pricing-service
    container_name: pricing-service
    ports:
      - "8090:8090"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres-pricing
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-pricing:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecommerce-net

  shipping-service:
    build: ./shipping-service
    container_name: shipping-service
    ports:
      - "8091:8091"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres-shipping
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8091/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-shipping:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - ecommerce-net

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8092:8092"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - DB_HOST=postgres-payment
      - REDIS_HOST=redis-cache
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_HOST=discovery-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8092/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ==========================================
  # 5. API GATEWAY (Inicia AL FINAL)
  # ==========================================

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_HOST=discovery-service
    depends_on:
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      pricing-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - ecommerce-net


  # ==========================================
  # 6. FRONTEND (Angular SSR)
  # ==========================================
  frontend:
    build: ./frontend
    container_name: frontend-app
    ports:
      - "4200:4000"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - ecommerce-net

  admin-frontend:
    build: ./admin-frontend
    container_name: admin-frontend
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - ecommerce-net

volumes:
  redis-data: