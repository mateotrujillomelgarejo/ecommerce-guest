server:
  port: 8094

spring:
  application:
    name: review-service

  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/review_db
    username: ${DB_USER:review_user}
    password: ${DB_PASS:review_1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

jwt:
  secret: "YXp1c3Qtc291LXN1cGVyLXNlY3JldC1rZXktbXV5LWxhcmdhLTI1Ni1iaXRzLW1pbmltby1oYXNo"

review:
  cache:
    rating-ttl-seconds: 600

rabbitmq:
  exchange: ecommerce.events
  routing-key:
    product-rating-updated: product.rating.updated

resilience4j:
  circuitbreaker:
    instances:
      order-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      order-service:
        maxAttempts: 3
        waitDuration: 1s

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    pe.takiq.ecommerce.review_service: DEBUG