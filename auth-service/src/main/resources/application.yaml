server:
  port: 8093

spring:
  application:
    name: auth-service

  config:
    import: ${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/auth_db
    username: auth_user
    password: auth_1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

jwt:
  secret: "YXp1c3Qtc291LXN1cGVyLXNlY3JldC1rZXktbXV5LWxhcmdhLTI1Ni1iaXRzLW1pbmltby1oYXNo"
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

auth:
  refresh-token:
    ttl-seconds: 604800
  revoked-token:
    ttl-seconds: 900

rabbitmq:
  exchange: ecommerce.events
  routing-key:
    user-registered: user.registered

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    pe.takiq.ecommerce.auth_service: DEBUG